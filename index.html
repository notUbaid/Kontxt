<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kontxt guides founders, builders, and hackathon teams from raw idea to production-ready project context." />
    <meta name="theme-color" content="#f2efe7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#140e0e" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <title>Kontxt</title>
    <script>
      try {
        if (localStorage.getItem('kontxt_theme') === 'dark') {
          document.documentElement.classList.add('dark');
        }
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
